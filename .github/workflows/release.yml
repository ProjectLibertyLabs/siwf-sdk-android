name: Publish Library to Maven Central
run-name: Publish Release ${{github.ref_name}}
concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: false
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # ex. v2.0.0
      - "v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+" # ex. v2.1.0-rc1

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NEW_RELEASE_TAG: ${{github.ref_name}}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: 11
          distribution: "temurin"

      - name: Decode GPG key
        run: |
          echo "${{ secrets.GPG_KEY }}" | base64 --decode > ./private.gpg

      - name: Publish to Maven Central
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SIGNING_SECRET_KEY_RING_FILE: ./private.gpg
          RELEASE_VERSION: ${{ env.NEW_RELEASE_TAG }}
        run: |
          ./gradlew publishAllPublicationsToSonatypeRepository --no-daemon --no-parallel
